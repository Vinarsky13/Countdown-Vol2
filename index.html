<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Time Left in This Month</title>
  <style>
    :root {
      --background: #000000;
      --foreground: #ffffff;
      --muted: #8f8f8f;
      --track: #1b1b1b;
      --progress: #ffffff;
      --card: #000000;
      --card-border: #202020;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      --widget-size: min(78vmin, 320px);
      --card-radius: 22px;
      --stroke-width: 10;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-width: 0;
      height: 100%;
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: var(--font);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .widget {
      width: min(100%, calc(var(--widget-size) + 48px));
      min-height: min(100%, calc(var(--widget-size) + 48px));
      display: grid;
      place-items: center;
      padding: 24px;
      border: 1px solid var(--card-border);
      border-radius: var(--card-radius);
      background: var(--card);
    }

    .progress-ring {
      position: relative;
      width: var(--widget-size);
      max-width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .progress-ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring circle {
      fill: none;
      stroke-linecap: round;
      stroke-width: var(--stroke-width);
    }

    .progress-ring__track {
      stroke: var(--track);
    }

    .progress-ring__bar {
      stroke: var(--progress);
      stroke-dasharray: var(--circumference);
      stroke-dashoffset: var(--circumference);
      transition: stroke-dashoffset 900ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 8px;
      line-height: 1;
      text-align: center;
      user-select: none;
    }

    .days-left {
      font-size: clamp(56px, 20vmin, 96px);
      font-weight: 650;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .label {
      color: var(--muted);
      font-size: clamp(14px, 4vmin, 18px);
      font-weight: 500;
      letter-spacing: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-ring__bar {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Time left in this month">
    <section class="progress-ring" aria-live="polite">
      <svg viewBox="0 0 120 120" role="img" aria-hidden="true">
        <circle class="progress-ring__track" cx="60" cy="60" r="52"></circle>
        <circle class="progress-ring__bar" cx="60" cy="60" r="52"></circle>
      </svg>

      <div class="content">
        <div class="days-left" id="daysLeft">0</div>
        <div class="label">Left in This Month</div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const ring = document.querySelector(".progress-ring__bar");
      const daysLeft = document.getElementById("daysLeft");
      const radius = Number(ring.getAttribute("r"));
      const circumference = 2 * Math.PI * radius;

      document.documentElement.style.setProperty("--circumference", circumference);

      function getMonthStats(date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const daysPassed = date.getDate();
        const daysRemaining = totalDays - daysPassed;
        const percentPassed = daysPassed / totalDays;

        return {
          totalDays,
          daysPassed,
          daysRemaining,
          percentPassed
        };
      }

      function setProgress(percent) {
        const clampedPercent = Math.min(Math.max(percent, 0), 1);
        const offset = circumference * (1 - clampedPercent);

        ring.style.strokeDasharray = `${circumference}`;
        ring.style.strokeDashoffset = `${offset}`;
      }

      function updateWidget() {
        const stats = getMonthStats(new Date());

        daysLeft.textContent = stats.daysRemaining;
        setProgress(stats.percentPassed);
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(updateWidget);
      });
      setInterval(updateWidget, 60 * 1000);
    })();
  </script>
</body>
</html>
