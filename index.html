<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Time Left in This Month</title>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: #8f8f8f;
      --line: #242424;
      --track: #161616;
      --progress: #ffffff;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      --radius: 22px;
      --ring-size: clamp(112px, 34vmin, 156px);
      --ring-stroke: 7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .widget {
      width: min(100%, 520px);
      min-height: 190px;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 28px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }

    .ring {
      position: relative;
      width: var(--ring-size);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      flex: none;
    }

    .ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring circle {
      fill: none;
      stroke-linecap: round;
      stroke-width: var(--ring-stroke);
    }

    .ring__track {
      stroke: var(--track);
    }

    .ring__progress {
      stroke: var(--progress);
      stroke-dasharray: var(--circumference);
      stroke-dashoffset: var(--circumference);
      transition: stroke-dashoffset 700ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .ring__copy {
      position: relative;
      display: grid;
      justify-items: center;
      gap: 3px;
      line-height: 1;
      text-align: center;
      user-select: none;
    }

    .days {
      font-size: clamp(46px, 15vmin, 68px);
      font-weight: 650;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .days-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .details {
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 8vmin, 42px);
      font-weight: 640;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .title span {
      display: block;
      color: var(--muted);
      font-weight: 520;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 12px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric__value {
      display: block;
      font-size: clamp(20px, 6vmin, 28px);
      font-weight: 620;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .metric__label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 430px) {
      body {
        padding: 10px;
      }

      .widget {
        min-height: 100%;
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 18px;
        padding: 18px;
        text-align: center;
      }

      .details {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .ring__progress {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="widget" aria-label="Time left in this month">
    <section class="ring" aria-live="polite">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <circle class="ring__track" cx="60" cy="60" r="52"></circle>
        <circle class="ring__progress" cx="60" cy="60" r="52"></circle>
      </svg>

      <div class="ring__copy">
        <div class="days" id="days">0</div>
        <div class="days-label">Days</div>
      </div>
    </section>

    <section class="details">
      <h1 class="title">Left in <span>This Month</span></h1>

      <div class="metrics" aria-hidden="true">
        <div class="metric">
          <span class="metric__value" id="hours">00</span>
          <span class="metric__label">Hours</span>
        </div>
        <div class="metric">
          <span class="metric__value" id="minutes">00</span>
          <span class="metric__label">Min</span>
        </div>
        <div class="metric">
          <span class="metric__value" id="seconds">00</span>
          <span class="metric__label">Sec</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      "use strict";

      const progressRing = document.querySelector(".ring__progress");
      const daysEl = document.getElementById("days");
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const radius = Number(progressRing.getAttribute("r"));
      const circumference = 2 * Math.PI * radius;
      const second = 1000;
      const minute = 60 * second;
      const hour = 60 * minute;
      const day = 24 * hour;

      document.documentElement.style.setProperty("--circumference", circumference);

      function getMonthRange(date) {
        return {
          start: new Date(date.getFullYear(), date.getMonth(), 1),
          end: new Date(date.getFullYear(), date.getMonth() + 1, 1)
        };
      }

      function getTimeLeft(date) {
        const range = getMonthRange(date);
        const total = range.end - range.start;
        const passed = date - range.start;
        const remaining = Math.max(range.end - date, 0);

        return {
          days: Math.floor(remaining / day),
          hours: Math.floor((remaining % day) / hour),
          minutes: Math.floor((remaining % hour) / minute),
          seconds: Math.floor((remaining % minute) / second),
          progress: Math.min(Math.max(passed / total, 0), 1)
        };
      }

      function twoDigits(value) {
        return String(value).padStart(2, "0");
      }

      function setProgress(value) {
        progressRing.style.strokeDasharray = `${circumference}`;
        progressRing.style.strokeDashoffset = `${circumference * (1 - value)}`;
      }

      function render() {
        const time = getTimeLeft(new Date());

        daysEl.textContent = time.days;
        hoursEl.textContent = twoDigits(time.hours);
        minutesEl.textContent = twoDigits(time.minutes);
        secondsEl.textContent = twoDigits(time.seconds);
        setProgress(time.progress);
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(render);
      });

      setInterval(render, second);
    })();
  </script>
</body>
</html>
