
  <title>Time Left in This Month</title>
  <style>
    :root {
      --background: #000000;
      --foreground: #ffffff;
      --bg: #000000;
      --text: #ffffff;
      --muted: #8f8f8f;
      --track: #1b1b1b;
      --line: #242424;
      --track: #161616;
      --progress: #ffffff;
      --card: #000000;
      --card-border: #202020;
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      --widget-size: min(78vmin, 320px);
      --card-radius: 22px;
      --stroke-width: 10;
      --radius: 22px;
      --ring-size: clamp(112px, 34vmin, 156px);
      --ring-stroke: 7;
    }

    * {
    html,
    body {
      width: 100%;
      min-width: 0;
      height: 100%;
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }
    body {
      display: grid;
      place-items: center;
      padding: 16px;
      padding: 14px;
    }

    .widget {
      width: min(100%, calc(var(--widget-size) + 48px));
      min-height: min(100%, calc(var(--widget-size) + 48px));
      width: min(100%, 520px);
      min-height: 190px;
      display: grid;
      place-items: center;
      padding: 24px;
      border: 1px solid var(--card-border);
      border-radius: var(--card-radius);
      background: var(--card);
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 28px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--bg);
    }

    .progress-ring {
    .ring {
      position: relative;
      width: var(--widget-size);
      max-width: 100%;
      width: var(--ring-size);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      flex: none;
    }

    .progress-ring svg {
    .ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      transform: rotate(-90deg);
    }

    .progress-ring circle {
    .ring circle {
      fill: none;
      stroke-linecap: round;
      stroke-width: var(--stroke-width);
      stroke-width: var(--ring-stroke);
    }

    .progress-ring__track {
    .ring__track {
      stroke: var(--track);
    }

    .progress-ring__bar {
    .ring__progress {
      stroke: var(--progress);
      stroke-dasharray: var(--circumference);
      stroke-dashoffset: var(--circumference);
      transition: stroke-dashoffset 900ms cubic-bezier(0.22, 1, 0.36, 1);
      transition: stroke-dashoffset 700ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .content {
    .ring__copy {
      position: relative;
      z-index: 1;
      display: grid;
      justify-items: center;
      gap: 8px;
      gap: 3px;
      line-height: 1;
      text-align: center;
      user-select: none;
    }

    .days-left {
      font-size: clamp(56px, 20vmin, 96px);
    .days {
      font-size: clamp(46px, 15vmin, 68px);
      font-weight: 650;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .label {
    .days-label {
      color: var(--muted);
      font-size: clamp(14px, 4vmin, 18px);
      font-weight: 500;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .details {
      min-width: 0;
      display: grid;
      gap: 18px;
    }

    .title {
      margin: 0;
      font-size: clamp(24px, 8vmin, 42px);
      font-weight: 640;
      line-height: 0.95;
      letter-spacing: 0;
    }

    .title span {
      display: block;
      color: var(--muted);
      font-weight: 520;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 12px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .metric__value {
      display: block;
      font-size: clamp(20px, 6vmin, 28px);
      font-weight: 620;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
    }

    .metric__label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 430px) {
      body {
        padding: 10px;
      }

      .widget {
        min-height: 100%;
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 18px;
        padding: 18px;
        text-align: center;
      }

      .details {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .progress-ring__bar {
      .ring__progress {
        transition: none;
      }
    }
</head>
<body>
  <main class="widget" aria-label="Time left in this month">
    <section class="progress-ring" aria-live="polite">
      <svg viewBox="0 0 120 120" role="img" aria-hidden="true">
        <circle class="progress-ring__track" cx="60" cy="60" r="52"></circle>
        <circle class="progress-ring__bar" cx="60" cy="60" r="52"></circle>
    <section class="ring" aria-live="polite">
      <svg viewBox="0 0 120 120" aria-hidden="true">
        <circle class="ring__track" cx="60" cy="60" r="52"></circle>
        <circle class="ring__progress" cx="60" cy="60" r="52"></circle>
      </svg>

      <div class="content">
        <div class="days-left" id="daysLeft">0</div>
        <div class="label">Left in This Month</div>
      <div class="ring__copy">
        <div class="days" id="days">0</div>
        <div class="days-label">Days</div>
      </div>
    </section>

    <section class="details">
      <h1 class="title">Left in <span>This Month</span></h1>

      <div class="metrics" aria-hidden="true">
        <div class="metric">
          <span class="metric__value" id="hours">00</span>
          <span class="metric__label">Hours</span>
        </div>
        <div class="metric">
          <span class="metric__value" id="minutes">00</span>
          <span class="metric__label">Min</span>
        </div>
        <div class="metric">
          <span class="metric__value" id="seconds">00</span>
          <span class="metric__label">Sec</span>
        </div>
      </div>
    </section>
  </main>
    (() => {
      "use strict";

      const ring = document.querySelector(".progress-ring__bar");
      const daysLeft = document.getElementById("daysLeft");
      const radius = Number(ring.getAttribute("r"));
      const progressRing = document.querySelector(".ring__progress");
      const daysEl = document.getElementById("days");
      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const radius = Number(progressRing.getAttribute("r"));
      const circumference = 2 * Math.PI * radius;
      const second = 1000;
      const minute = 60 * second;
      const hour = 60 * minute;
      const day = 24 * hour;

      document.documentElement.style.setProperty("--circumference", circumference);

      function getMonthStats(date) {
        const year = date.getFullYear();
        const month = date.getMonth();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const daysPassed = date.getDate();
        const daysRemaining = totalDays - daysPassed;
        const percentPassed = daysPassed / totalDays;
      function getMonthRange(date) {
        return {
          start: new Date(date.getFullYear(), date.getMonth(), 1),
          end: new Date(date.getFullYear(), date.getMonth() + 1, 1)
        };
      }

      function getTimeLeft(date) {
        const range = getMonthRange(date);
        const total = range.end - range.start;
        const passed = date - range.start;
        const remaining = Math.max(range.end - date, 0);

        return {
          totalDays,
          daysPassed,
          daysRemaining,
          percentPassed
          days: Math.floor(remaining / day),
          hours: Math.floor((remaining % day) / hour),
          minutes: Math.floor((remaining % hour) / minute),
          seconds: Math.floor((remaining % minute) / second),
          progress: Math.min(Math.max(passed / total, 0), 1)
        };
      }

      function setProgress(percent) {
        const clampedPercent = Math.min(Math.max(percent, 0), 1);
        const offset = circumference * (1 - clampedPercent);
      function twoDigits(value) {
        return String(value).padStart(2, "0");
      }

        ring.style.strokeDasharray = `${circumference}`;
        ring.style.strokeDashoffset = `${offset}`;
      function setProgress(value) {
        progressRing.style.strokeDasharray = `${circumference}`;
        progressRing.style.strokeDashoffset = `${circumference * (1 - value)}`;
      }

      function updateWidget() {
        const stats = getMonthStats(new Date());
      function render() {
        const time = getTimeLeft(new Date());

        daysLeft.textContent = stats.daysRemaining;
        setProgress(stats.percentPassed);
        daysEl.textContent = time.days;
        hoursEl.textContent = twoDigits(time.hours);
        minutesEl.textContent = twoDigits(time.minutes);
        secondsEl.textContent = twoDigits(time.seconds);
        setProgress(time.progress);
      }

      requestAnimationFrame(() => {
        requestAnimationFrame(updateWidget);
        requestAnimationFrame(render);
      });
      setInterval(updateWidget, 60 * 1000);

      setInterval(render, second);
    })();
  </script>
</body>
